        .toast{position:fixed;bottom:2rem;right:2rem;padding:1rem 1.5rem;border-radius:12px;font-weight:700;font-size:0.85rem;transform:translateX(150%);transition:transform 0.3s;z-index:99999}

        .copy-btn{background:rgba(0,242,255,0.1);border:1px solid rgba(0,242,255,0.3);color:var(--cyan);padding:0.5rem 1rem;border-radius:8px;cursor:pointer;font-size:0.75rem;font-weight:700}

<script>
// ═══════════════════════════════════════════════════

    "E-commerce IA": "https://images.unsplash.com/photo-1556742049-0cfed4f6a45d?auto=format&fit=crop&w=600&q=80",

    "IA Generativa": "https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&w=600&q=80"

const PAYMENTS = {
    crypto: {
        USDT: { address: "0xeBe965EFe1ab53d2da915134d72e5BdBd5E3C053", net: "BEP20" },
        BTC: { address: "bc1qjjgsx3lwa0wz59l89htcpr28j5s7dtmv99fmw0", net: "Bitcoin" },
        ETH: { address: "0x2F4bc6f77719AB99BCd6a9b553729bB96C9B8c22", net: "Ethereum" }
    },
    banks: {
        USA: { bank: "Lead Bank", holder: "Diego Edgardo Cortez Yanez", acc: "211534854868", route: "101019644" },
        Europa: { bank: "OPENPAYD MALTA", holder: "Diego Edgardo Cortez Yáñez", iban: "MT12CFTE28004000000000005456093", bic: "CFTEMTM1XXX" },
        Bolivia: { bank: "Banco Mercantil Santa Cruz", holder: "DIEGO EDGARDO CORTEZ YAÑEZ", acc: "4069474188", ci: "5808841TJ" },
        Mexico: { bank: "CLABE", holder: "Diego Edgardo Cortez Yañez", clabe: "646180546701268303" }
    },
};

let products = [];
let displayed = 0;
const PER_PAGE = 24;
let currentProduct = null;

// ═══════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════

async function init() {
    try {
        const res = await fetch('products.json');
        const data = await res.json();
        products = data.products;
        products.forEach(p => {
            p.price = FIXED_PRICE;
            // Asignar imagen por categoría
            p.image = CATEGORY_IMAGES[p.category] || CATEGORY_IMAGES["IA Generativa"];
        });
    } catch(e) {
        console.error('Error cargando productos:', e);
        generateLocalProducts();
    }
    
    renderProducts();
    populateCategories();
    updateStats();
    startClock();
}

function generateLocalProducts() {
    const nichos = Object.keys(CATEGORY_IMAGES);
    const experts = ["Alex Hormozi", "Jeff Bezos", "Frank Kern", "Naval Ravikant", "Steve Jobs", "Andrew Ng", "Gary Vaynerchuk", "Neil Patel", "Tim Ferriss", "Russell Brunson", "Pat Flynn", "MrBeast", "Warren Buffett", "Robert Kiyosaki", "Seth Godin", "Grant Cardone", "Ben Settle", "Jordan Belfort", "Sabri Suby", "Dan Kennedy"];
    
    products = [];
    for (let i = 0; i < 500; i++) {
        const nicho = nichos[i % nichos.length];
        const expert = experts[i % experts.length];
        products.push({
            id: 'local_' + i,
            title: `🔥 Tutorial ${nicho} 2026 — Método ${expert}`,
            description: `Aprende ${nicho} desde cero con el método de ${expert}. Video HD, guía PDF, prompts, workflows n8n y audio. "${LEMA}"`,
            price: FIXED_PRICE,
            category: nicho,
            expert: expert,
            image: CATEGORY_IMAGES[nicho],
            level: 'starter',
            formats: ['video', 'pdf', 'audio', 'workflow'],
            language: 'es'
        });
    }
}

// ═══════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════

function renderProducts() {
    const grid = document.getElementById('productsGrid');
    const toShow = products.slice(0, displayed + PER_PAGE);
    displayed = toShow.length;
    
    grid.innerHTML = toShow.map(p => `
        <div class="card cursor-pointer group" onclick="openProduct('${p.id}')">
            <div class="relative h-44 overflow-hidden">
                <img src="${p.image}" alt="${p.category}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&w=600&q=80'">
                <div class="fixed-price">$${FIXED_PRICE}</div>
                <div class="absolute bottom-2 left-2 flex gap-1">
                    <span class="bg-black/70 text-[8px] px-2 py-0.5 rounded text-cyan-400 font-bold">VIDEO</span>
                    <span class="bg-black/70 text-[8px] px-2 py-0.5 rounded text-purple-400 font-bold">PDF</span>
                </div>
            </div>
            <div class="p-4">
                <h3 class="font-bold text-sm text-white group-hover:text-cyan-400 transition-colors line-clamp-2 mb-2">${p.title}</h3>
                <p class="text-[11px] text-gray-500 line-clamp-2 mb-3">${p.description}</p>
                <div class="flex justify-between items-center">
                    <span class="text-[10px] text-cyan-400 font-bold">${p.category}</span>
                    <button class="btn btn-primary text-xs py-2 px-4" onclick="event.stopPropagation(); openCheckout('${p.id}')">Comprar</button>
                </div>
            </div>
        </div>
    `).join('');
    
    document.getElementById('loadMoreContainer').classList.toggle('hidden', displayed >= products.length);
    document.getElementById('statProducts').textContent = products.length.toLocaleString();
    document.getElementById('showingCount').textContent = `Mostrando ${displayed.toLocaleString()} de ${products.length.toLocaleString()}`;
}

function loadMore() { renderProducts(); }

function populateCategories() {
    const cats = [...new Set(products.map(p => p.category))];
    document.getElementById('statCategories').textContent = cats.length;
    document.getElementById('categoryFilter').innerHTML = '<option value="all">Todas las categorías</option>' + cats.map(c => `<option value="${c}">${c}</option>`).join('');
}

function filterProducts() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const cat = document.getElementById('categoryFilter').value;
    const filtered = products.filter(p => {
        const matchQ = p.title.toLowerCase().includes(q) || p.description.toLowerCase().includes(q);
        const matchCat = cat === 'all' || p.category === cat;
        return matchQ && matchCat;
    });
    displayed = Math.min(PER_PAGE, filtered.length);
    document.getElementById('productsGrid').innerHTML = filtered.slice(0, displayed).map(p => `
        <div class="card cursor-pointer group" onclick="openProduct('${p.id}')">
            <div class="relative h-44 overflow-hidden">
                <img src="${p.image}" alt="${p.category}" loading="lazy" onerror="this.src='https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&w=600&q=80'">
                <div class="fixed-price">$${FIXED_PRICE}</div>
            </div>
            <div class="p-4">
                <h3 class="font-bold text-sm line-clamp-2 mb-2">${p.title}</h3>
                <p class="text-[11px] text-gray-500 line-clamp-2 mb-3">${p.description}</p>
                <div class="flex justify-between items-center">
                    <span class="text-[10px] text-cyan-400 font-bold">${p.category}</span>
                    <button class="btn btn-primary text-xs py-2 px-4" onclick="event.stopPropagation(); openCheckout('${p.id}')">Comprar</button>
                </div>
            </div>
        </div>
    `).join('');
    document.getElementById('showingCount').textContent = `Mostrando ${displayed.toLocaleString()} de ${filtered.length.toLocaleString()}`;
}

// ═══════════════════════════════════════════════════
// PRODUCT DETAIL
// ═══════════════════════════════════════════════════

function openProduct(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    currentProduct = p;
    document.getElementById('modalContent').innerHTML = `
        <div class="h-64 rounded-xl overflow-hidden mb-6"><img src="${p.image}" alt="${p.title}" class="w-full h-full object-cover" onerror="this.src='https://images.unsplash.com/photo-1677442136019-21780ecad995?auto=format&fit=crop&w=800&q=80'"></div>
        <h2 class="text-2xl font-black mb-2">${p.title}</h2>
        <p class="text-gray-400 mb-4">${p.description}</p>
        <div class="flex gap-2 mb-4 flex-wrap">
            <span class="bg-cyan-500/20 text-cyan-400 px-3 py-1 rounded-full text-xs font-bold">📹 Video HD</span>
            <span class="bg-purple-500/20 text-purple-400 px-3 py-1 rounded-full text-xs font-bold">📄 PDF 30+ págs</span>
            <span class="bg-green-500/20 text-green-400 px-3 py-1 rounded-full text-xs font-bold">🎧 Audio</span>
            <span class="bg-yellow-500/20 text-yellow-400 px-3 py-1 rounded-full text-xs font-bold">⚙️ Workflow</span>
        </div>
        <p class="text-sm text-gray-500 mb-6 italic">"${LEMA}"</p>
        <div class="flex items-center gap-4">
            <span class="text-4xl font-black text-cyan-400">$${FIXED_PRICE}</span>
            <button class="btn btn-primary text-lg px-8 py-3" onclick="openCheckout('${p.id}')"><i class="fas fa-shopping-cart mr-2"></i>Comprar Ahora</button>
        </div>
    `;
    document.getElementById('productModal').classList.add('active');
}

// ═══════════════════════════════════════════════════
// CHECKOUT
// ═══════════════════════════════════════════════════

function openCheckout(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    currentProduct = p;
    document.getElementById('checkoutProductName').textContent = p.title;
    document.getElementById('checkoutModal').classList.add('active');
    switchPayTab('stripe');
}

function switchPayTab(tab) {
    const content = document.getElementById('payContent');
    document.querySelectorAll('#checkoutModal .tab-btn').forEach(b => b.classList.remove('active'));
    if(event) event.target.classList.add('active');
    
    
    else if(tab==='crypto') content.innerHTML=`<div class="space-y-3"><div class="p-3 bg-white/5 rounded-xl flex justify-between items-center"><div><p class="text-[8px] font-bold text-cyan-400 uppercase">USDT/USDC (BEP20)</p><code class="text-[10px] break-all">${PAYMENTS.crypto.USDT.address}</code></div><button class="copy-btn" onclick="copyText('${PAYMENTS.crypto.USDT.address}')"><i class="fas fa-copy"></i></button></div><div class="p-3 bg-white/5 rounded-xl flex justify-between items-center"><div><p class="text-[8px] font-bold text-yellow-400 uppercase">Bitcoin</p><code class="text-[10px] break-all">${PAYMENTS.crypto.BTC.address}</code></div><button class="copy-btn" onclick="copyText('${PAYMENTS.crypto.BTC.address}')"><i class="fas fa-copy"></i></button></div><div class="p-3 bg-white/5 rounded-xl flex justify-between items-center"><div><p class="text-[8px] font-bold text-blue-400 uppercase">Ethereum</p><code class="text-[10px] break-all">${PAYMENTS.crypto.ETH.address}</code></div><button class="copy-btn" onclick="copyText('${PAYMENTS.crypto.ETH.address}')"><i class="fas fa-copy"></i></button></div><p class="text-[9px] text-center text-amber-500 font-bold">Reportar a @d3h1ckt4rglobal_bot</p></div>`;
    if(tab==='qr') content.innerHTML=`<div class="text-center py-4"><p class="text-sm font-bold text-amber-400 mb-3">PAGO RAPIDO QR MULTIPAGO</p><div class="bg-white p-3 rounded-xl inline-block mb-3"><img src="https://api.qrserver.com/v1/create-qr-code/?size=200x200&amp;data=ethereum:0xeBe965EFe1ab53d2da915134d72e5BdBd5E3C053?value=6.99e18&amp;color=d4af37" width="180" height="180" class="mx-auto"/></div><p class="text-[10px] text-gray-400 mb-2">USDT BEP20 - BTC - ETH - BNB</p><p class="text-[9px] text-amber-500 font-bold">$6.99 USD</p></div>`;
    else else content.innerHTML=`<div class="space-y-3"><div class="p-3 bg-white/5 rounded-xl"><p class="text-[8px] font-bold text-cyan-400 uppercase">🇺🇸 USA — Lead Bank</p><p class="text-[10px]">Routing: ${PAYMENTS.banks.USA.route}<br>Cta: ${PAYMENTS.banks.USA.acc}<br>${PAYMENTS.banks.USA.holder}</p></div><div class="p-3 bg-white/5 rounded-xl"><p class="text-[8px] font-bold text-purple-400 uppercase">🇪🇺 Europa — Openpayd</p><p class="text-[10px]">IBAN: ${PAYMENTS.banks.Europa.iban}<br>BIC: ${PAYMENTS.banks.Europa.bic}</p></div><div class="p-3 bg-white/5 rounded-xl"><p class="text-[8px] font-bold text-green-400 uppercase">🇧🇴 Bolivia — BMSC</p><p class="text-[10px]">Cta: ${PAYMENTS.banks.Bolivia.acc}<br>CI: ${PAYMENTS.banks.Bolivia.ci}</p></div></div>`;
}

function copyText(t){navigator.clipboard.writeText(t);showToast('✅ Copiado','success')}

function processOrder(){
    const e=document.getElementById('buyerEmail').value;if(!e)return showToast('❌ Email requerido','error');
    const o={id:'ORD-'+Math.random().toString(36).substr(2,8).toUpperCase(),product:currentProduct.title,email:e,amount:FIXED_PRICE,status:'pending',date:new Date().toISOString()};
    let sales=JSON.parse(localStorage.getItem('apollo_sales')||'[]');sales.unshift(o);localStorage.setItem('apollo_sales',JSON.stringify(sales));
    closeModal('checkoutModal');showToast('✅ Orden: '+o.id,'success');
}

function updateStats(){
    const sales=JSON.parse(localStorage.getItem('apollo_sales')||'[]');
    document.getElementById('statSales')&&statSales&&(statSales.textContent=sales.length);
}

function showToast(m,t){const x=document.getElementById('toast');x.textContent=m;x.className='toast '+t+' show';setTimeout(()=>x.classList.remove('show'),3000)}
function closeModal(id){document.getElementById(id).classList.remove('active')}
function startClock(){setInterval(()=>{document.getElementById('liveTime').textContent=new Date().toLocaleTimeString('es-ES')},1000)}
function setView(v,e){document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));e.classList.add('active')}

document.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
